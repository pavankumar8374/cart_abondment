<!DOCTYPE html>
<html>
<head>
  <title>Cart Recovery Bot</title>
  <script src="/static/script.js"></script>
</head>
<body>
  <h1>🛒 E-commerce Demo</h1>

  <label>Name: <input type="text" id="name" /></label><br />
  <label>Phone (with country code): <input type="text" id="phone" /></label><br />

  <h3>Products</h3>
  <ul id="product-list">
    <li>Shirt <button onclick="addToCart('Shirt')">Add to Cart</button></li>
    <li>Pants <button onclick="addToCart('Pants')">Add to Cart</button></li>
    <li>Shoes <button onclick="addToCart('Shoes')">Add to Cart</button></li>
  </ul>

  <h3>Your Cart:</h3>
  <ul id="cart"></ul>

  <button onclick="simulateAbandonCart()">Simulate Abandon Cart</button>
</body>
</html>
